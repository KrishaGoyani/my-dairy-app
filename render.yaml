# Render Blueprint — optional: deploy via Render Dashboard → New → Blueprint
services:
  - type: web
    name: dairy-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: dairy_management
      - key: CORS_ORIGINS
        sync: false
